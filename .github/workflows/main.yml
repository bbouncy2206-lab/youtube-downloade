name: 🔐 Téléchargement sécurisé

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'URL de la playlist'
        required: true
      quality:
        description: 'Qualité'
        default: 'best[height<=720]'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Installer yt-dlp
        run: pip install yt-dlp
        
      - name: Télécharger (identifiants cachés)
        run: |
          yt-dlp \
            --username "${{ secrets.GOOGLE_EMAIL }}" \
            --password "${{ secrets.GOOGLE_PASSWORD }}" \
            --extractor-args "youtube:player_client=android" \
            -f "${{ github.event.inputs.quality }}" \
            -o "%(playlist_index)s - %(title)s.%(ext)s" \
            "${{ github.event.inputs.playlist_url }}"
            
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: "*.mp4"
