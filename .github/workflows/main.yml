name: Télécharger une playlist YouTube

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'URL de la playlist YouTube'
        required: true
        type: string
        default: 'https://youtube.com/playlist?list=...'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Installer yt-dlp et FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install --upgrade yt-dlp

    - name: Créer le fichier cookies.txt depuis les secrets
      run: |
        if [ -n "${{ secrets.YT_COOKIES }}" ]; then
          echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt
          echo "✅ Cookies chargés avec succès"
          ls -la cookies.txt
        else
          echo "⚠️ Pas de cookies - téléchargement sans authentification"
        fi

    - name: Télécharger avec cookies (si disponibles)
      run: |
        echo "🚀 Téléchargement de la playlist..."
        
        # Construire la commande
        CMD="yt-dlp"
        
        # Ajouter les cookies si disponibles
        if [ -f "cookies.txt" ]; then
          CMD="$CMD --cookies cookies.txt"
        else
          CMD="$CMD --cookies-from-browser firefox"  # Fallback (ne marchera pas sur GitHub)
        fi
        
        # Ajouter les arguments
        CMD="$CMD --extractor-args \"youtube:player_client=android\""
        CMD="$CMD -f \"best[height<=720]\""
        CMD="$CMD -o \"%(playlist_index)s - %(title)s.%(ext)s\""
        CMD="$CMD \"${{ github.event.inputs.playlist_url }}\""
        
        # Afficher la commande (sans les cookies)
        echo "📋 Commande: yt-dlp [cookies] --extractor-args..."
        
        # Exécuter
        eval $CMD

    - name: Lister les fichiers téléchargés
      run: |
        echo "📋 Fichiers téléchargés :"
        ls -lh *.mp4 *.mkv *.webm 2>/dev/null || echo "Aucun fichier vidéo trouvé"

    - name: Créer l'archive ZIP
      run: |
        # Créer un dossier avec le nom de la playlist
        PLAYLIST_NAME="videos_$(date +'%Y%m%d_%H%M%S')"
        mkdir -p "$PLAYLIST_NAME"
        
        # Déplacer toutes les vidéos
        mv *.mp4 *.mkv *.webm "$PLAYLIST_NAME/" 2>/dev/null || true
        
        # Créer le ZIP si des fichiers existent
        if [ -n "$(ls -A $PLAYLIST_NAME 2>/dev/null)" ]; then
          zip -r "videos.zip" "$PLAYLIST_NAME"
          echo "✅ Archive créée: videos.zip"
          ls -lh videos.zip
        else
          echo "⚠️ Aucune vidéo à zipper"
        fi

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: videos-telecharges
        path: videos.zip
        if-no-files-found: warn
        retention-days: 7
