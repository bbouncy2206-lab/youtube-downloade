name: Télécharger une playlist YouTube

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'URL de la playlist YouTube'
        required: true
        type: string
        default: 'https://youtube.com/playlist?list=PLsVYsZZy4UwXrRvTZVb0lZ5BJ3QZSJagt'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Installer yt-dlp et FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install --upgrade yt-dlp

    - name: Vérifier les installations
      run: |
        yt-dlp --version
        ffmpeg -version | head -n1

    - name: Télécharger avec TA commande exacte
      run: |
        echo "🚀 Téléchargement avec ta commande..."
        echo "📋 Commande: yt-dlp --cookies-from-browser firefox --extractor-args \"youtube:player_client=android\" -f \"best[height<=720]\" -o \"%(playlist_index)s - %(title)s.%(ext)s\" \"${{ github.event.inputs.playlist_url }}\""
        echo "-------------------"
        
        # TA COMMANDE EXACTE (copiée-collée)
        yt-dlp \
          --cookies-from-browser firefox \
          --extractor-args "youtube:player_client=android" \
          -f "best[height<=720]" \
          -o "%(playlist_index)s - %(title)s.%(ext)s" \
          "${{ github.event.inputs.playlist_url }}"

    - name: Lister les fichiers téléchargés
      run: |
        echo "📋 Fichiers téléchargés :"
        ls -lh *.mp4 *.mkv *.webm 2>/dev/null || echo "Aucun fichier vidéo trouvé"

    - name: Créer l'archive ZIP
      run: |
        # Créer un dossier temporaire
        mkdir -p videos
        
        # Déplacer toutes les vidéos dans le dossier
        mv *.mp4 *.mkv *.webm videos/ 2>/dev/null || true
        
        # Créer le ZIP si des fichiers existent
        if [ -n "$(ls -A videos 2>/dev/null)" ]; then
          zip -r "videos.zip" videos/
          echo "✅ Archive créée: videos.zip"
          ls -lh videos.zip
        else
          echo "⚠️ Aucune vidéo à zipper"
        fi

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: videos-telecharges
        path: |
          videos.zip
        if-no-files-found: warn
        retention-days: 7
